name: Deploy to AWS EC2

on:
  push:
    branches:
      - pipeline

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js with NVM
        run: |
          export NVM_DIR="$HOME/.nvm"
          mkdir -p "$NVM_DIR"
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.3/install.sh | bash
          echo 'export NVM_DIR="$HOME/.nvm"' >> $GITHUB_ENV
          echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $GITHUB_ENV
          echo '[ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"' >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          source $HOME/.nvm/nvm.sh
          nvm use 22.12.0
          npm install

      - name: Build Next.js App
        run: npm run build

      - name: Copy Files to EC2
        env:
          EC2_HOST: ubuntu@51.20.135.233
        run: |
          mkdir -p deploy
          tar -czf deploy/app.tar.gz .next package.json package-lock.json
          scp -i ~/.ssh/deploy_key deploy/app.tar.gz $EC2_HOST:~/app.tar.gz

      - name: Deploy on EC2
        env:
          EC2_HOST: ubuntu@51.20.135.233
        run: |
          ssh -i ~/.ssh/deploy_key $EC2_HOST << EOF
          mkdir -p ~/app && tar -xzf ~/app.tar.gz -C ~/app && cd ~/app
          npm install --production
          pm2 stop all || true
          pm2 start npm --name "nextjs-app" -- start
          EOF
